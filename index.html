<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Мой сайт</title>
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
</head>
<body>
    <h1>Добро пожаловать!</h1>
    
    <script>
    // ВАШИ ДАННЫЕ
    const botToken = '8582977696:AAH5cmD-pjbF7J60R49MW0rB7onmje8DHLY'; // Токен бота
    const chatId = '5099005051'; // Ваш Chat ID

    // Функция получения IP через бесплатный сервис
    $.getJSON('https://api.ipify.org?format=json', function(data) {
        const ip = data.ip;
        const userAgent = navigator.userAgent;
        const time = new Date().toLocaleString('ru-RU');
        const page = window.location.href;
        
        // Формируем сообщение
        const message = `🔥 Новый посетитель!
🕒 Время: ${time}
🌐 IP: ${ip}
📱 Браузер: ${userAgent}
📄 Страница: ${page}`;
        
        // Отправляем в Telegram
        fetch(`https://api.telegram.org/bot${botToken}/sendMessage`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
                chat_id: chatId,
                text: message,
                parse_mode: 'HTML'
            })
        });
    });
    </script>
</body>
</html>
