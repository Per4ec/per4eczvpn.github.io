<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Мой сайт</title>
    <style>
        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            text-align: center;
            padding-top: 50px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            margin: 0;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }
        h1 { font-size: 3em; margin-bottom: 20px; }
        .status {
            background: rgba(255,255,255,0.2);
            padding: 15px 30px;
            border-radius: 50px;
            margin-top: 20px;
        }
        .ip-box {
            background: rgba(0,0,0,0.3);
            padding: 10px 20px;
            border-radius: 10px;
            font-size: 1.5em;
            margin: 20px 0;
        }
    </style>
</head>
<body>
    <h1>👋 Добро пожаловать!</h1>
    
    <div class="ip-box">
        <span id="ip-display">Определяем ваш IP...</span>
    </div>
    
    <div class="status" id="status">
        Отправка данных в Telegram...
    </div>

    <script>
    // ВАШИ ДАННЫЕ (уже вставлены)
    const botToken = '';
    const chatId = '';

    // Функция получения IP
    async function getIP() {
        try {
            const response = await fetch('https://api.ipify.org?format=json');
            const data = await response.json();
            return data.ip;
        } catch (error) {
            console.error('Ошибка получения IP:', error);
            return 'Не удалось определить';
        }
    }

    // Функция отправки в Telegram
    async function sendToTelegram(ip) {
        const userAgent = navigator.userAgent;
        const time = new Date().toLocaleString('ru-RU', { 
            timeZone: 'Europe/Moscow',
            dateStyle: 'full',
            timeStyle: 'medium'
        });
        const page = window.location.href;
        const language = navigator.language;
        const platform = navigator.platform;
        
        // Формируем красивое сообщение
        const message = `🔥 <b>НОВЫЙ ПОСЕТИТЕЛЬ!</b>
        
🕐 <b>Время:</b> ${time}
🌐 <b>IP-адрес:</b> <code>${ip}</code>
💻 <b>Платформа:</b> ${platform}
🌍 <b>Язык:</b> ${language}
📱 <b>User Agent:</b> ${userAgent}
📄 <b>Страница:</b> ${page}`;

        try {
            const response = await fetch(`https://api.telegram.org/bot${botToken}/sendMessage`, {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                },
                body: JSON.stringify({
                    chat_id: chatId,
                    text: message,
                    parse_mode: 'HTML'
                })
            });
            
            const result = await response.json();
            
            if (result.ok) {
                document.getElementById('status').innerHTML = '✅ Успешно отправлено!';
                document.getElementById('status').style.background = 'rgba(40, 167, 69, 0.3)';
            } else {
                throw new Error(result.description);
            }
        } catch (error) {
            document.getElementById('status').innerHTML = '❌ Ошибка отправки: ' + error.message;
            document.getElementById('status').style.background = 'rgba(220, 53, 69, 0.3)';
            console.error('Telegram error:', error);
        }
    }

    // Главная функция
    async function main() {
        // Показываем статус
        document.getElementById('status').innerHTML = '⏳ Получаем IP...';
        
        // Получаем IP
        const ip = await getIP();
        document.getElementById('ip-display').innerHTML = ip;
        
        // Отправляем в Telegram
        document.getElementById('status').innerHTML = '⏳ Отправляем в Telegram...';
        await sendToTelegram(ip);
    }

    // Запускаем когда страница загрузится
    window.addEventListener('load', main);
    </script>
</body>
</html>
